<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Slicing Spacetime</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<!-- Historical timeline bar -->
<div class="era-timeline" id="eraTimeline">
    <div class="era-line"></div>
    <div class="era-dot" data-era="1915"><span class="era-year">1915</span><span class="era-label">Einstein</span></div>
    <div class="era-dot" data-era="1959"><span class="era-year">1959</span><span class="era-label">ADM</span></div>
    <div class="era-dot" data-era="1995"><span class="era-year">1995</span><span class="era-label">BSSN</span></div>
    <div class="era-dot" data-era="2005"><span class="era-year">2005</span><span class="era-label">Breakthrough</span></div>
    <div class="era-dot" data-era="2015"><span class="era-year">2015</span><span class="era-label">LIGO</span></div>
    <div class="era-dot" data-era="2026"><span class="era-year">2026</span><span class="era-label">GPU + NR</span></div>
</div>

<div class="deck" id="deck"></div>

<a href="/" class="back-btn" title="Back to website">&larr; Back to FII</a>

<div class="nav">
    <button onclick="Deck.restart()" title="Restart (Home)">&laquo;</button>
    <button onclick="Deck.prev()" title="Previous">&larr;</button>
    <span class="slide-counter" id="counter">1 / 1</span>
    <button onclick="Deck.next()" title="Next">&rarr;</button>
</div>

<button class="notes-toggle" id="notesToggle" onclick="Deck.toggleNotes()" title="Press N to toggle">NOTES</button>
<button class="toc-toggle" id="tocToggle" onclick="Deck.toggleTOC()" title="Press T for contents">&#9654;</button>
<div class="toc-panel" id="tocPanel"></div>

<div id="notesPanel"><div class="notes-inner"></div></div>

<div class="progress" id="progress"></div>

<!-- Core -->
<script src="js/core/deck.js"></script>

<!-- Slide content -->
<script src="js/slides/content.js"></script>

<!-- Animations (self-contained, bound by data-anim attribute — no index dependency) -->
<script src="js/animations/timeline.js"></script>
<script src="js/animations/gravity-speed.js"></script>
<script src="js/animations/gw-motivation.js"></script>
<script src="js/animations/shatter.js"></script>
<script src="js/animations/ds-metric.js"></script>
<script src="js/animations/geodesics.js"></script>
<script src="js/animations/slicer.js"></script>
<script src="js/animations/ligo.js"></script>
<script src="js/animations/gpu.js"></script>
<script src="js/animations/bounce.js"></script>

<!-- Boot -->
<script>
    Slides.inject();
    Deck.init();
</script>

</body>
</html>
