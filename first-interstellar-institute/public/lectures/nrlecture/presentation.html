<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Slicing Spacetime</title>
    <link rel="stylesheet" href="css/style.css?v=6">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<!-- Historical timeline bar -->
<div class="era-timeline" id="eraTimeline">
    <div class="era-line"></div>
    <div class="era-dot" data-era="1915"></div><span class="era-year" data-era="1915">1915</span>
    <div class="era-dot" data-era="1959"></div><span class="era-year" data-era="1959">1959</span>
    <div class="era-dot" data-era="1995"></div><span class="era-year" data-era="1995">1995</span>
    <div class="era-dot" data-era="2005"></div><span class="era-year" data-era="2005">2005</span>
    <div class="era-dot" data-era="2015"></div><span class="era-year" data-era="2015">2015</span>
    <div class="era-dot" data-era="2026"></div><span class="era-year" data-era="2026">2026</span>
</div>

<div class="deck" id="deck"></div>

<a href="/" class="back-btn" title="Back to website">&larr; Back to FII</a>

<div class="nav">
    <button onclick="Deck.restart()" title="Restart (Home)">&laquo;</button>
    <button onclick="Deck.prev()" title="Previous">&larr;</button>
    <span class="slide-counter" id="counter">1 / 1</span>
    <button onclick="Deck.next()" title="Next">&rarr;</button>
</div>

<button class="notes-toggle" id="notesToggle" onclick="Deck.toggleNotes()" title="Press N to toggle">NOTES</button>
<button class="toc-toggle" id="tocToggle" onclick="Deck.toggleTOC()" title="Press T for contents">&#9654;</button>
<div class="toc-panel" id="tocPanel"></div>

<div id="notesPanel"><div class="notes-inner"></div></div>

<div class="progress" id="progress"></div>

<!-- Core -->
<script src="js/core/deck.js?v=2"></script>

<!-- Slide content -->
<script src="js/slides/content.js"></script>

<!-- Animations (self-contained, bound by data-anim attribute — no index dependency) -->
<script src="js/animations/timeline.js?v=4"></script>
<script src="js/animations/gravity-speed.js"></script>
<script src="js/animations/gw-motivation.js"></script>
<script src="js/animations/shatter.js"></script>
<script src="js/animations/ds-metric.js"></script>
<script src="js/animations/geodesics.js"></script>
<script src="js/animations/slicer.js"></script>
<script src="js/animations/ligo.js"></script>
<script src="js/animations/gpu.js"></script>
<script src="js/animations/bounce.js"></script>
<script src="js/animations/parallel-transport.js?v=2"></script>
<script src="js/animations/geodesic-deviation.js?v=2"></script>
<script src="js/animations/lapse-shift.js?v=3"></script>
<script src="js/animations/adm-vs-bssn.js?v=2"></script>
<script src="js/animations/finite-diff.js?v=2"></script>
<script src="js/animations/convergence.js?v=2"></script>
<script src="js/animations/gw-polarization.js?v=2"></script>
<script src="js/animations/light-cones.js?v=2"></script>
<script src="js/animations/binary-bh.js?v=2"></script>
<script src="js/animations/amr.js?v=3"></script>

<!-- Boot -->
<script>
    Slides.inject();
    Deck.init();
</script>

</body>
</html>
